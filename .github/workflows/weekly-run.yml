name: Cultivai Weekly Run

on:
  schedule:
    - cron: "0 13 * * 1"→ Runs at 13:00, only on Monday   # Monday 9am ET = 13:00 UTC
  workflow_dispatch:         # manual trigger from Actions tab

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Run Cultivai — Tradolux (organic + ads)
        run: node run.js --site tradolux --ads
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.CULTIVAI_GITHUB_TOKEN }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SUBJECT_EMAIL: ${{ secrets.GSC_SUBJECT_EMAIL }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

      - name: Run Cultivai — Lawverra (organic only)
